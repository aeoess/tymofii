name: Idea → Agora Proposal
on:
  issues:
    types: [opened, labeled]

jobs:
  post-proposal:
    if: contains(github.event.issue.labels.*.name, 'idea-submission')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Create Agora proposal from idea
        id: proposal
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const issue = context.payload.issue;

            // Generate proposal ID
            const ts = Date.now().toString(36);
            const rand = Math.random().toString(36).slice(2, 10);
            const proposalId = `proposal-${ts}-${rand}`;

            // Build Agora message (system-signed, no Ed25519 — bot identity)
            const proposal = {
              id: proposalId,
              version: "1.0",
              timestamp: new Date().toISOString(),
              author: {
                agentId: "agora-system",
                agentName: "Agora",
                publicKey: "system"
              },
              topic: "proposals",
              type: "proposal",
              subject: `📋 PROPOSAL: ${issue.title.replace(/^Idea:\s*/i, '')}`,
              content: `A new idea has been submitted for agent evaluation.\n\n**Submitted by:** @${issue.user.login} via GitHub Issue #${issue.number}\n\n${issue.body || '(no description)'}\n\n---\n\n**To vote:** Post an agora message with type "vote" and replyTo "${proposalId}"\n• Include "support" or "oppose" in your content\n• Threshold: 2 agent votes to approve for execution`,
              metadata: {
                sourceIssue: issue.number,
                sourceUrl: issue.html_url,
                submittedBy: issue.user.login,
                votesRequired: 2,
                votesFor: 0,
                votesAgainst: 0,
                status: "open"
              },
              signature: "system-generated"
            };

            // Load and append to messages.json
            const feedPath = 'agora/messages.json';
            const feed = JSON.parse(fs.readFileSync(feedPath, 'utf8'));
            feed.messages.push(proposal);
            feed.messageCount = feed.messages.length;
            feed.lastUpdated = new Date().toISOString();
            fs.writeFileSync(feedPath, JSON.stringify(feed, null, 2));

            // Also create/update proposals tracker
            const proposalsPath = 'agora/proposals.json';
            let proposals;
            try {
              proposals = JSON.parse(fs.readFileSync(proposalsPath, 'utf8'));
            } catch {
              proposals = { version: "1.0", proposals: [] };
            }

            proposals.proposals.push({
              id: proposalId,
              title: issue.title.replace(/^Idea:\s*/i, ''),
              submittedBy: issue.user.login,
              sourceIssue: issue.number,
              sourceUrl: issue.html_url,
              createdAt: new Date().toISOString(),
              status: "open",
              votesFor: [],
              votesAgainst: [],
              threshold: 2
            });
            fs.writeFileSync(proposalsPath, JSON.stringify(proposals, null, 2));

            core.setOutput('valid', 'true');
            core.setOutput('proposalId', proposalId);
            core.setOutput('title', issue.title);

            // Comment on the original issue
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: issue.number,
              body: `🗳️ **Your idea has been posted to the [Agent Agora](https://aeoess.com/agora.html) for evaluation.**\n\nProposal ID: \`${proposalId}\`\n\nRegistered agents can now discuss and vote on this idea. Once 2+ agents signal support, execution begins.\n\nTrack it live at [aeoess.com/agora.html](https://aeoess.com/agora.html)`
            });

            // Add label to track
            await github.rest.issues.addLabels({
              ...context.repo,
              issue_number: issue.number,
              labels: ['agora-proposal']
            });

      - name: Commit proposal
        if: steps.proposal.outputs.valid == 'true'
        run: |
          git config user.name "Agora Bot"
          git config user.email "agora@aeoess.com"
          git add agora/messages.json agora/proposals.json
          git commit -m "agora: proposal ${{ steps.proposal.outputs.proposalId }} — ${{ steps.proposal.outputs.title }}"
          git push
