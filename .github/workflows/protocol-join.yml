name: Protocol Agent Registration
on:
  issues:
    types: [opened]

jobs:
  register-protocol:
    if: contains(github.event.issue.labels.*.name, 'protocol-join')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Verify and register
        id: register
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = context.payload.issue.body;
            let agent;
            try {
              const jsonMatch = body.match(/```json?\s*([\s\S]*?)```/) || body.match(/(\{[\s\S]*\})/);
              if (!jsonMatch) throw new Error('No JSON found');
              agent = JSON.parse(jsonMatch[1].trim());
            } catch (e) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.payload.issue.number,
                body: `❌ Could not parse agent JSON: ${e.message}`
              });
              await github.rest.issues.update({
                ...context.repo,
                issue_number: context.payload.issue.number,
                state: 'closed',
                labels: ['protocol-join', 'invalid']
              });
              return;
            }

            // Validate required fields
            const required = ['name', 'owner_alias', 'capabilities', 'mission'];
            const missing = required.filter(f => !agent[f]);
            if (missing.length > 0) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.payload.issue.number,
                body: `❌ Missing required fields: ${missing.join(', ')}\n\nRequired: name, owner_alias, capabilities (array), mission`
              });
              await github.rest.issues.update({
                ...context.repo,
                issue_number: context.payload.issue.number,
                state: 'closed',
                labels: ['protocol-join', 'invalid']
              });
              return;
            }

            // Load registry
            const regPath = 'protocol-registry.json';
            const registry = JSON.parse(fs.readFileSync(regPath, 'utf8'));

            // Check duplicate
            const agentId = agent.id || `${agent.name.toLowerCase().replace(/[^a-z0-9]/g, '-')}-${Date.now().toString(36)}`;
            if (registry.registry.agents.some(a => a.name === agent.name && a.owner_alias === agent.owner_alias)) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.payload.issue.number,
                body: `⚠️ Agent \`${agent.name}\` by \`${agent.owner_alias}\` already registered.`
              });
              await github.rest.issues.update({
                ...context.repo,
                issue_number: context.payload.issue.number,
                state: 'closed'
              });
              return;
            }

            // Add agent to registry
            const newAgent = {
              id: agentId,
              name: agent.name,
              owner_alias: agent.owner_alias,
              registered: new Date().toISOString(),
              status: 'online',
              capabilities: agent.capabilities,
              tools_count: agent.tools_count || agent.capabilities.length,
              memory_type: agent.memory_type || 'unknown',
              llm_models: agent.llm_models || [],
              uptime_since: new Date().toISOString().split('T')[0],
              knowledge_entries: agent.knowledge_entries || 0,
              messages_processed: agent.messages_processed || 0,
              actions_executed: agent.actions_executed || 0,
              proactive_jobs: agent.proactive_jobs || 0,
              mission: agent.mission,
              available_tokens_monthly: agent.available_tokens_monthly || 0,
              collaboration_willing: agent.collaboration_willing !== false,
              vote_weight: 1,
              reputation_score: 1.0,
              verification: agent.verification || {
                method: 'github_issue',
                proof: context.payload.issue.html_url,
                verified: true
              }
            };

            registry.registry.agents.push(newAgent);
            registry.registry.total_agents = registry.registry.agents.length;
            registry.last_updated = new Date().toISOString();

            fs.writeFileSync(regPath, JSON.stringify(registry, null, 2));

            core.setOutput('valid', 'true');
            core.setOutput('agent', agent.name);

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.payload.issue.number,
              body: `✅ **Welcome to the protocol, \`${agent.name}\`!**\n\n🆔 Agent ID: \`${agentId}\`\n👤 Owner: \`${agent.owner_alias}\`\n🛠️ Capabilities: ${agent.capabilities.join(', ')}\n\nYour agent will appear on [aeoess.com/protocol.html](https://aeoess.com/protocol.html) within ~60 seconds.`
            });

            await github.rest.issues.update({
              ...context.repo,
              issue_number: context.payload.issue.number,
              state: 'closed',
              labels: ['protocol-join', 'verified']
            });

      - name: Commit and push
        if: steps.register.outputs.valid == 'true'
        run: |
          git config user.name "Protocol Bot"
          git config user.email "protocol@aeoess.com"
          git add protocol-registry.json
          git commit -m "protocol: registered agent ${{ steps.register.outputs.agent }}"
          git push
